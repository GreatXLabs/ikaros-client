spring.application.name=ikaros-gateway
server.port=${JAVA_APP_PORT:8080}

# ikaros-server TCP connection
ikaros.server.host=${IKAROS_SERVER_HOST}
ikaros.server.port=${IKAROS_SERVER_PORT}

# CORS
ikaros.cors.allowed-origins=${IKAROS_CORS_ALLOWED_ORIGINS}

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB