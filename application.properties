spring.application.name=ikaros-gateway
server.port=${JAVA_APP_PORT:8080}

# ikaros-server TCP connection
ikaros.server.host=${IKAROS_SERVER_HOST}
ikaros.server.port=${IKAROS_SERVER_PORT}

# CORS
server.servlet.cors.origins=${IKAROS_CORS_ALLOWED_ORIGINS}
server.servlet.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
server.servlet.cors.allowed-headers=Content-Type,Authorization
server.servlet.cors.exposed-headers=Authorization

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB