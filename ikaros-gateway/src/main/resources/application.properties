spring.application.name=ikaros-gateway
server.port=${JAVA_APP_PORT:8080}

# ikaros-server TCP connection
ikaros.server.host=${IKAROS_SERVER_HOST:localhost}
ikaros.server.port=${IKAROS_SERVER_PORT:9999}

# CORS
ikaros.cors.allowed-origins=${IKAROS_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# MinIO object storage
minio.endpoint=${MINIO_ENDPOINT}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET}

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
