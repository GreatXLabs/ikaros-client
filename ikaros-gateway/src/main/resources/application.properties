spring.application.name=ikaros-gateway

server.port=${SERVER_PORT:8080}

# ikaros-server TCP connection
ikaros.server.host=${IKAROS_SERVER_HOST:localhost}
ikaros.server.port=${IKAROS_SERVER_PORT:9000}

# CORS
ikaros.cors.allowed-origins=${IKAROS_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
