spring.application.name=ikaros-gateway

server.port=8080

# ikaros-server TCP connection
ikaros.server.host=localhost
ikaros.server.port=9000

# CORS - overridden by environment variable IKAROS_CORS_ALLOWED_ORIGINS
# ikaros.cors.allowed-origins=http://localhost:5173

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB